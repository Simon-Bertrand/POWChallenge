name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unified E2E Tests (Python + Rust + JS)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Runtimes ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # ── Cargo cache (registry + both target dirs) ─────────────────────────────
      # Target dirs are created by the pre-build step below, so they exist at
      # cache-save time on every run after the first.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            servers/rust/target
            servers/rust/example/axum_server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('servers/rust/Cargo.lock', 'servers/rust/example/axum_server/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── JS caches ─────────────────────────────────────────────────────────────
      - name: Cache servers/js node_modules
        uses: actions/cache@v4
        with:
          path: servers/js/node_modules
          key: ${{ runner.os }}-servers-js-${{ hashFiles('servers/js/package-lock.json') }}

      - name: Cache servers/js/example/express node_modules
        uses: actions/cache@v4
        with:
          path: servers/js/example/express/node_modules
          key: ${{ runner.os }}-express-${{ hashFiles('servers/js/example/express/package-lock.json', 'servers/js/package-lock.json') }}

      # ── Pre-build: Rust axum example ──────────────────────────────────────────
      # Without this, `cargo run` inside e2e.js would compile from scratch,
      # taking 3-5 minutes — far beyond the 12-second boot timeout.
      - name: Pre-build Rust axum example server
        run: cargo build
        working-directory: servers/rust/example/axum_server

      # ── Pre-install: JS Express example (compiles native argon2 via node-gyp) ─
      # Without this, `npm install` inside e2e.js setup() compiles argon2,
      # taking longer than the 4-second boot timeout.
      - name: Pre-install JS Express example dependencies
        run: npm install
        working-directory: servers/js/example/express

      # ── Run the full test suite ───────────────────────────────────────────────
      - name: Run unified E2E tests (make test)
        run: make test

