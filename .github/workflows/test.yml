name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unified E2E Tests (Python + Rust + JS)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Runtimes ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            client-js/package-lock.json
            servers/js/package-lock.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # ── Cargo cache ───────────────────────────────────────────────────────────
      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            servers/rust/target
            servers/rust/example/axum_server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('servers/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── npm install (pre-warm, make test will re-run but cache speeds things up)
      - name: Install client-js dependencies
        run: npm ci
        working-directory: client-js

      - name: Install servers/js dependencies
        run: npm ci
        working-directory: servers/js

      # ── Run the full test suite ───────────────────────────────────────────────
      - name: Run unified E2E tests (make test)
        run: make test
