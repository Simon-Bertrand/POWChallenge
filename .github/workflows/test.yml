name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unified E2E Tests (Python + Rust + JS)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Runtimes ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # ── Cargo cache (only ~/.cargo — target/ doesn't exist on fresh checkout)
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('servers/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── npm caches ────────────────────────────────────────────────────────────
      - name: Cache client-js node_modules
        uses: actions/cache@v4
        with:
          path: client-js/node_modules
          key: ${{ runner.os }}-client-js-${{ hashFiles('client-js/package-lock.json') }}

      - name: Cache servers/js node_modules
        uses: actions/cache@v4
        with:
          path: servers/js/node_modules
          key: ${{ runner.os }}-servers-js-${{ hashFiles('servers/js/package-lock.json') }}

      # ── Run the full test suite ───────────────────────────────────────────────
      - name: Run unified E2E tests (make test)
        run: make test

